services:
  - type: web
    name: dongsim-bridge
    env: node
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: MAIN_PROJECT_ID
        sync: false
      - key: MAIN_CLIENT_EMAIL
        sync: false
      - key: MAIN_PRIVATE_KEY
        sync: false
      - key: BACKUP_PROJECT_ID
        sync: false
      - key: BACKUP_CLIENT_EMAIL
        sync: false
      - key: BACKUP_PRIVATE_KEY
        sync: false
      - key: BRIDGE_SECRET
        sync: false
