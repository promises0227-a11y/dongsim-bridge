services:
  - type: web
    name: dongsim-bridge
    env: node
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: MAIN_SERVICE_ACCOUNT_B64
        sync: false
      - key: BACKUP_SERVICE_ACCOUNT_B64
        sync: false
      - key: BRIDGE_SECRET
        sync: false
